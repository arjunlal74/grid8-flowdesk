
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: grid8_backend
    restart: unless-stopped
    env_file: ../backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3003:3001"
    volumes:
      - uploads:/app/uploads
    command: >
      sh -c "npx prisma migrate deploy && node prisma/seed.js && node src/server.js"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: grid8_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: grid8_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: grid8
      MYSQL_USER: grid8
      MYSQL_PASSWORD: grid8secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dbdata:
  uploads:
